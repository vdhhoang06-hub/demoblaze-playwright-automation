name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  
  # 1. KÍCH HOẠT CHẠY THỦ CÔNG (Tính năng cực kỳ hữu ích)
  # Cho phép em vào tab Actions trên GitHub và bấm nút "Run workflow" bất cứ lúc nào
  workflow_dispatch: 
  
  # 2. KÍCH HOẠT CHẠY ĐỊNH KỲ (Cron Job)
  schedule:
    # Cú pháp Cron: phút, giờ, ngày của tháng, tháng, ngày của tuần
    # '*/3 * * * *' nghĩa là chạy mỗi 3 phút
    - cron: '*/3 * * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        # Sư phụ giữ nguyên 30 ngày theo cấu hình gốc của em
        retention-days: 30