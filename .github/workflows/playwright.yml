name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  
  # 1. MANUAL TRIGGER (Highly useful feature)
  # Allows triggering the workflow manually via the "Run workflow" button in the GitHub Actions tab at any time
  workflow_dispatch: 
  
  # 2. SCHEDULED TRIGGER (Cron Job)
  # schedule:
  #   # Cron syntax: minute, hour, day of month, month, day of week
  #   # '*/3 * * * *' means running every 3 minutes
  #   - cron: '*/3 * * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        # Retain the report for 30 days
        retention-days: 30